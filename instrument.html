<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythmx - Music Instruments</title>
<link rel="stylesheet" href="instrument.css">
</head>

<body>
 <header>
    <div class="logo">🎵 RhythmX</div>
    <nav>
        <a href="home.html">Home</a>
        <a href="director.html">Directors</a>
        <a href="instrument.html">Instruments</a>
        <a href="post.html">Upload Music</a>
        <a href="feed.html">Posts</a>
        <a href="profile.html">Profile</a>
    </nav>
   <div class="profile">
    Welcome, <span id="profileName"></span> |
    <button onclick="logout()" style="background:none;border:none;color:white;cursor:pointer;">Logout</button>
</div>
</header>
<div class="search-box">
    <h1>Music Instruments</h1>
<input type="text" id="searchInput" placeholder="Search Instruments or Music..." onkeyup="searchInstruments()">
</div>

<div class="container" id="instrumentContainer"></div>

<div class="songs-section" id="songsSection">
<h2 id="instrumentTitle"></h2>
<div id="songsList"></div>
</div>
<script type="module">

/* =========================
   FIREBASE IMPORTS
========================= */

import { initializeApp, getApps, getApp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyAyoJLg5gJnGStzuZXDLYyk8zNLd0DzFII",
  authDomain: "audio-auro-pro.firebaseapp.com",
  projectId: "audio-auro-pro",
  appId: "1:480222649355:web:3308d7303a2e8021e57b0e"
};

const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
const auth = getAuth(app);

let firebaseUser = null;
let userPlan = "free"; // default plan

/* =========================
   AUTH CHECK + NAME (UPDATED)
========================= */

onAuthStateChanged(auth, (user) => {

  const profileName = document.getElementById("profileName");
  const logoutBtn = document.querySelector(".profile button");

  if (user) {
    firebaseUser = user;

    // Logged in
    const username = user.email.split("@")[0];
    profileName.innerText = username;

    if (logoutBtn) logoutBtn.style.display = "inline";

  } else {

    // Not logged in
    firebaseUser = null;
    profileName.innerText = "User";

    if (logoutBtn) logoutBtn.style.display = "none";
  }

});

/* =========================
   LOGOUT
========================= */

window.logout = function () {
  if(firebaseUser){
    signOut(auth).then(() => {
      alert("Logged out successfully!");
      location.reload();
    });
  }
};
/* =========================
   MUSIC SYSTEM
========================= */

let currentAudio = null;

/* =========================
   VISIBLE INSTRUMENTS
========================= */

const visibleInstruments = [
{
name:"Piano",
image:"https://m.media-amazon.com/images/I/71FLMdfjPRL.png",
songs:[
{title:"Piano Music 1", file:"audio/piano1.mp3"},
{title:"Piano Music 2", file:"audio/piano2.mp3"},
{title:"Piano Music 3", file:"audio/piano3.mp3"}
]
},
{
name:"Tabla",
image:"https://thumbs.dreamstime.com/b/ethnic-musical-instruments-tabla-hang-interior-chill-out-107712150.jpg",
songs:[
{title:"Tabla Music 1", file:"audio/tabla1.mp3"},
{title:"Tabla Music 2", file:"audio/tabla2.mp3"},
{title:"Tabla Music 3", file:"audio/tabla3.mp3"}
]
},
{
name:"Guitar",
image:"https://png.pngtree.com/thumb_back/fh260/background/20230717/pngtree-lone-acoustic-guitar-in-a-shadowy-studio-3d-rendered-image-image_3898846.jpg",
songs:[
{title:"Guitar Music 1", file:"audio/guitar1.mp3"},
{title:"Guitar Music 2", file:"audio/guitar2.mp3"},
{title:"Guitar Music 3", file:"audio/guitar3.mp3"}
]
}
];

const hiddenInstruments = [
{
name:"Drums",
image:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQzc_FeCSbwjWowvT5Y9aBdQDRdgQXnfEiawg&s",
songs:[
{title:"Drum Music 1", file:"audio/drum1.mp3"},
{title:"Drum Music 2", file:"audio/drum2.mp3"},
{title:"Drum Music 3", file:"audio/drum3.mp3"}
]
},
{
name:"Veena",
image:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtsWWpGtvP_yNUp1yLKuhIPsjYa5u4yTLASw&s",
songs:[
{title:"Veena Music 1", file:"audio/veena1.mp3"},
{title:"Veena Music 2", file:"audio/veena2.mp3"},
{title:"Veena Music 3", file:"audio/veena3.mp3"}
]
},
{
name:"Flute",
image:"https://i.pinimg.com/736x/87/85/24/878524ed631849a8e81d6704fe569b9d.jpg",
songs:[
{title:"Flute Music 1", file:"audio/flute1.mp3"},
{title:"Flute Music 2", file:"audio/flute2.mp3"},
{title:"Flute Music 3", file:"audio/flute3.mp3"}
]
}
];

const allInstruments = [...visibleInstruments, ...hiddenInstruments];

/* =========================
   DISPLAY INSTRUMENTS
========================= */

window.displayInstruments = function(list){

let container = document.getElementById("instrumentContainer");
container.innerHTML = "";

if(list.length === 0){
container.innerHTML = `
<div style="text-align:center; width:100%; margin-top:40px; font-size:20px; color:#FFFFFF">
We furtherly working on it 🚧
</div>
`;
return;
}

list.forEach(instrument => {

let card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<img src="${instrument.image}">
<h3>${instrument.name}</h3>
<p>${instrument.songs.length} Music Files</p>
`;

card.onclick = function(){
window.showSongs(instrument);
};

container.appendChild(card);

});
};

displayInstruments(visibleInstruments);

/* =========================
   SEARCH INSTRUMENTS
========================= */

window.searchInstruments = function(){

let input = document.getElementById("searchInput").value.trim().toLowerCase();

if(input === ""){
displayInstruments(visibleInstruments);
return;
}

let filtered = allInstruments.filter(instrument => {
let nameMatch = instrument.name.toLowerCase().includes(input);
let musicMatch = instrument.songs.some(song =>
song.title.toLowerCase().includes(input)
);
return nameMatch || musicMatch;
});

displayInstruments(filtered);
};

/* =========================
   SHOW SONGS
========================= */

window.showSongs = function(instrument){

let section = document.getElementById("songsSection");
let title = document.getElementById("instrumentTitle");
let list = document.getElementById("songsList");

section.style.display = "block";
title.innerText = instrument.name + " - " + instrument.songs.length + " Music Files";
list.innerHTML = "";

instrument.songs.forEach(song => {

let div = document.createElement("div");
div.className = "song";

div.innerHTML = `
<p>${song.title}</p>
<audio src="${song.file}"></audio>
<div style="margin-top:6px; font-size:14px; color:#aaa;">
<span class="current">0:00</span> /
<span class="duration">0:00</span>
</div>
<button onclick="playSong(this)">▶ Play</button>
<button style="display:none;" onclick="pauseSong(this)">⏸ Pause</button>
`;

list.appendChild(div);

let audio = div.querySelector("audio");
let currentSpan = div.querySelector(".current");
let durationSpan = div.querySelector(".duration");

audio.addEventListener("loadedmetadata", function(){
durationSpan.textContent = window.formatTime(audio.duration);
});

audio.addEventListener("timeupdate", function(){
currentSpan.textContent = window.formatTime(audio.currentTime);
});

audio.addEventListener("ended", function(){
div.querySelector("button:nth-of-type(1)").style.display = "inline-block";
div.querySelector("button:nth-of-type(2)").style.display = "none";
currentSpan.textContent = "0:00";
});

});

};

/* =========================
   PLAY / PAUSE
========================= */

window.playSong = function(btn){

let songDiv = btn.parentElement;
let audio = songDiv.querySelector("audio");
let pauseBtn = songDiv.querySelector("button:nth-of-type(2)");

if(currentAudio && currentAudio !== audio){
currentAudio.pause();
let oldDiv = currentAudio.parentElement;
oldDiv.querySelector("button:nth-of-type(1)").style.display = "inline-block";
oldDiv.querySelector("button:nth-of-type(2)").style.display = "none";
}

audio.play();
currentAudio = audio;

btn.style.display = "none";
pauseBtn.style.display = "inline-block";
};

window.pauseSong = function(btn){

let songDiv = btn.parentElement;
let audio = songDiv.querySelector("audio");
let playBtn = songDiv.querySelector("button:nth-of-type(1)");

audio.pause();

btn.style.display = "none";
playBtn.style.display = "inline-block";
};

/* =========================
   FORMAT TIME
========================= */

window.formatTime = function(seconds){

let mins = Math.floor(seconds / 60);
let secs = Math.floor(seconds % 60);

if(secs < 10){
secs = "0" + secs;
}

return mins + ":" + secs;
};

</script>
</body>
</html>

/* =========================
   AUTH CHECK + NAME
========================= */

onAuthStateChanged(auth, (user) => {

    firebaseUser = user;
    document.getElementById("profileName").innerText =
      user.email.split("@")[0];
  } else {
    window.location.href = "login.html";
  }
});

window.logout = function () {
  signOut(auth).then(() => {

  });
};

========================= */

};

const allDirectors = [...visibleDirectors, ...hiddenDirectors];

/* =========================
   DISPLAY DIRECTORS
========================= */

window.displayDirectors = function(list){
  let container = document.getElementById("directorContainer");
  container.innerHTML = "";

  list.forEach(director => {
    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${director.image}">
      <h3>${director.name}</h3>
      <p>${director.songs.length} Songs</p>
    `;

    card.onclick = function(){
      window.showSongs(director);
    };

    container.appendChild(card);
  });
};

displayDirectors(visibleDirectors);

/* =========================
   SEARCH
========================= */

// Live search function for directors page
const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", function() {
    const query = this.value.trim().toLowerCase();

    // If input is empty, show all directors
    if(query === "") {
        displayDirectors(allDirectors);
        return;
    }

    // Filter directors based on name or song title
    const filtered = allDirectors.filter(director =>
        director.name.toLowerCase().includes(query) ||
        director.songs.some(song => song.title.toLowerCase().includes(query))
    );

    displayDirectors(filtered);
});

/* =========================
   SHOW SONGS
========================= */

window.showSongs = function(director){
  let section = document.getElementById("songsSection");
  let title = document.getElementById("directorTitle");
  let list = document.getElementById("songsList");

  section.style.display = "block";
  title.innerText = director.name + " - " + director.songs.length + " Songs";
  list.innerHTML = "";

  director.songs.forEach((song,index) => {
    let div = document.createElement("div");
    div.className = "song";

    div.innerHTML = `
      <p>${song.title}</p>
      <audio src="${song.file}"></audio>
      <div style="margin-top:6px; font-size:14px; color:#aaa;">
        <span class="current">0:00</span> / <span class="duration">0:00</span>
      </div>
      <button onclick="if(canAccessSong(${index})) playSong(this)">▶ Play</button>
      <button style="display:none;" onclick="pauseSong(this)">⏸ Pause</button>
    `;

    list.appendChild(div);

    let audio = div.querySelector("audio");
    let currentSpan = div.querySelector(".current");
    let durationSpan = div.querySelector(".duration");

    audio.addEventListener("loadedmetadata", function(){
      durationSpan.textContent = formatTime(audio.duration);
    });

    audio.addEventListener("timeupdate", function(){
      currentSpan.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener("ended", function(){
      div.querySelector("button:nth-of-type(1)").style.display = "inline-block";
      div.querySelector("button:nth-of-type(2)").style.display = "none";
      currentSpan.textContent = "0:00";
    });

  });
};

/* =========================
   FORMAT TIME
========================= */

window.formatTime = function(seconds){
  let mins = Math.floor(seconds / 60);
  let secs = Math.floor(seconds % 60);
  if(secs < 10) secs = "0" + secs;
  return mins + ":" + secs;
};

/* =========================
   PLAY / PAUSE
========================= */

window.playSong = function(btn){
  let songDiv = btn.parentElement;
  let audio = songDiv.querySelector("audio");
  let pauseBtn = songDiv.querySelector("button:nth-of-type(2)");

  if(currentAudio && currentAudio !== audio){
    currentAudio.pause();
    let oldDiv = currentAudio.parentElement;
    oldDiv.querySelector("button:nth-of-type(1)").style.display = "inline-block";
    oldDiv.querySelector("button:nth-of-type(2)").style.display = "none";
  }

  audio.play();
  currentAudio = audio;
  btn.style.display = "none";
  pauseBtn.style.display = "inline-block";
};

window.pauseSong = function(btn){
  let songDiv = btn.parentElement;
  let audio = songDiv.querySelector("audio");
  let playBtn = songDiv.querySelector("button:nth-of-type(1)");

  audio.pause();
  btn.style.display = "none";
  playBtn.style.display = "inline-block";
};

</script>
